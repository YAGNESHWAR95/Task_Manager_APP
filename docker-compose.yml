version: '3.8'

services:
  db:
    image: mongo:6.0
    container_name: task_manager_db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  backend:
    build: ./backend
    container_name: task_manager_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://db:27017/taskmanagerdb
      - PORT=5000
      - JWT_SECRET=taskmanagerjwtsecretkey95
    depends_on:
      - db
    restart: always

  frontend:
    build: ./frontend
    container_name: task_manager_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongo-data:
